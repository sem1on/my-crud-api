name: CRUD Performance Test

on:
  push:
    branches: [ master ]
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  crud-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Start API server in background
        run: |
          node server.js &
          echo "API_PID=$!" >> $GITHUB_ENV
      
      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:3000/api/items > /dev/null; then
              echo "✅ API is ready!"
              exit 0
            fi
            echo "⏳ Waiting for API... ($i/30)"
            sleep 2
          done
          echo "❌ API failed to start"
          exit 1
      
      - name: Setup k6
        uses: grafana/setup-k6-action@v1
      
      - name: Run CRUD test
        run: |
          k6 run \
            --summary-export=results.json \
            k6-tests/scripts/crud-test.js
      
      - name: Stop API server
        if: always()
        run: kill ${{ env.API_PID }} || true
      
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: results.json
      
      - name: Check thresholds
        run: |
          if grep -q '"thresholds":.*"failed":' results.json; then
            echo "❌ Thresholds failed!"
            exit 1
          else
            echo "✅ All thresholds passed!"
          fi